<!DOCTYPE HTML>
<html lang="fr">

<head>
    <script>
        window.ontouchstart = function (e) { };

        // Init
        window.buildVersion = window.top.buildVersion;
        window.appVersion = window.top.appVersion;
        window.appInfo = {
            version: window.top.appVersion
        };

        window._ = {
            appVersion: window.appVersion,
            buildVersion: window.buildVersion,
            client: "ios"
        };

        window.indexedDB = {};
        window.IDBDatabase = {};
        window.IDBTransaction = {};
        window.IDBCursor = {};
        window.IDBKeyRange = {};

        window.cordova = {
            plugins: {
                isemulator: {
                    assess: function (fct) {
                        fct(false);
                    }
                },
                Keyboard: {
                    close: function () { },
                    disableScroll: function () { },
                    show: function () { },
                    hideKeyboardAccessoryBar: function () { }
                },
                notification: {
                    local: false
                },
                pushNotification: {
                    onDeviceReady: function () { },
                    setUserId: function () { },
                    registerDevice: function () { }
                }
            }
        };

        if (window.top.platform == "darwin") {
            (function () {
                window.requestAnimationFrame = function (callback) {
                    var self = requestAnimationFrame;
                    self.queue.push(callback);
                    if (!self.timeout) {
                        self.timeout = setTimeout(function () {
                            var queue = self.queue;
                            self.queue = [];
                            self.timeout = null;
                            queue.forEach(function (q) {
                                q();
                            });
                        }, 16);
                    }
                };
                requestAnimationFrame.queue = [];
                requestAnimationFrame.timeout = null;
            })();
        }

        var head = document.getElementsByTagName('head')[0];

       

    </script>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="build/styles-native.css" />
    <link rel="stylesheet" href="fixes.css" />
</head>

<body>

</body>

</html>
