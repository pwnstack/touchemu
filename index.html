<!DOCTYPE HTML>
<html lang="fr">

<head>
    <script>
        window.ontouchstart = function (e) { };

        // Init
        window.buildVersion = window.top.buildVersion;
        window.appVersion = window.top.appVersion;
        window.appInfo = {
            version: window.top.appVersion
        };

        window._ = {
            appVersion: window.appVersion,
            buildVersion: window.buildVersion,
            client: "ios"
        };

        window.indexedDB = {};
        window.IDBDatabase = {};
        window.IDBTransaction = {};
        window.IDBCursor = {};
        window.IDBKeyRange = {};

        window.cordova = {
            plugins: {
                isemulator: {
                    assess: function (fct) {
                        fct(false);
                    }
                },
                Keyboard: {
                    close: function () { },
                    disableScroll: function () { },
                    show: function () { },
                    hideKeyboardAccessoryBar: function () { }
                },
                notification: {
                    local: false
                },
                pushNotification: {
                    onDeviceReady: function () { },
                    setUserId: function () { },
                    registerDevice: function () { }
                }
            }
        };

        if (window.top.platform == "darwin") {
            (function () {
                window.requestAnimationFrame = function (callback) {
                    var self = requestAnimationFrame;
                    self.queue.push(callback);
                    if (!self.timeout) {
                        self.timeout = setTimeout(function () {
                            var queue = self.queue;
                            self.queue = [];
                            self.timeout = null;
                            queue.forEach(function (q) {
                                q();
                            });
                        }, 16);
                    }
                };
                requestAnimationFrame.queue = [];
                requestAnimationFrame.timeout = null;
            })();
        }

        var head = document.getElementsByTagName('head')[0];
    </script>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="build/styles-native.css" />
    <link rel="stylesheet" href="fixes.css" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        a.button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        a.button:hover {
            background-color: #0056b3;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>

</body>

</html>
